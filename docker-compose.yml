x-shared:
  seek_base: &seek_base
    build: .
    image: fairdom/seek:main

    restart: always
    environment: &seek_base_env
      RAILS_ENV: production
      SOLR_PORT: 8983
      SOLR_HOST: solr
      RAILS_LOG_LEVEL: info # debug, info, warn, error or fatal
    env_file:
      - docker/db.env
      - .env
    volumes:
      - seek-filestore:/seek/filestore
      - seek-cache:/seek/tmp/cache
    depends_on:
      db:
        condition: service_healthy
      solr:
        condition: service_started


services:
  db:
    # Database implementation, in this case MySQL
    image: mysql:8.4
    container_name: seek-mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --log-error-verbosity=1
    restart: always
    stop_grace_period: 1m30s
    env_file:
      - docker/db.env
    volumes:
      - seek-mysql-db:/var/lib/mysql
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h localhost -u $$MYSQL_USER -p$$MYSQL_PASSWORD --silent" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s


  seek:
    # The SEEK application
    <<: *seek_base
    container_name: seek
    command: docker/entrypoint.sh
    ports:
      - "3000:3000"
    environment:
      <<: *seek_base_env
      NO_ENTRYPOINT_WORKERS: 1
      OMNIAUTH_OIDC_DEFAULT_INSTITUTION: ${OMNIAUTH_OIDC_DEFAULT_INSTITUTION:-'Default Institution'}
      OMNIAUTH_OIDC_DEFAULT_INSTITUTION_COUNTRY: ${OMNIAUTH_OIDC_DEFAULT_INSTITUTION_COUNTRY:-'NL'}
      OMNIAUTH_OIDC_DEFAULT_INSTITUTION_CITY: ${OMNIAUTH_OIDC_DEFAULT_INSTITUTION_CITY:-'Duckstad'}
      OMNIAUTH_OIDC_DEFAULT_INSTITUTION_WEB: ${OMNIAUTH_OIDC_DEFAULT_INSTITUTION_WEB:-'http://www.example.com'}
      OMNIAUTH_ENABLED: 'true'
      OMNIAUTH_OIDC_ENABLED: 'true'
      OMNIAUTH_OIDC_NAME: '${OMNIAUTH_OIDC_NAME:-Your OIDC Provider}'
      OMNIAUTH_OIDC_ISSUER: '${OMNIAUTH_OIDC_ISSUER:-https://your-oidc-provider.com}'
      OMNIAUTH_OIDC_CLIENT_ID: '${OMNIAUTH_OIDC_CLIENT_ID:-your-client-id}'
      OMNIAUTH_OIDC_SECRET: '${OMNIAUTH_OIDC_SECRET:-your-client-secret}'
      OMNIAUTH_OIDC_SCOPE: '${OMNIAUTH_OIDC_SCOPE:-openid email profile}'
      OMNIAUTH_OIDC_GROUPS: '${OMNIAUTH_OIDC_GROUPS:-realm_access.roles}'
      OMNIAUTH_OIDC_ADMIN_KEYWORDS: '${OMNIAUTH_OIDC_ADMIN_KEYWORDS:-admin,administrator,owner,admins,owners}'
      OMNIAUTH_OIDC_REDIRECT_URI: '${OMNIAUTH_OIDC_REDIRECT_URI:-http://localhost:3000/auth/oidc/callback}'
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/up" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - ./custom-config/initializers/seek_env_defaults.rb:/seek/config/initializers/seek_env_defaults.rb:ro
      - ./custom-config/initializers/custom_sessions.rb:/seek/config/initializers/custom_sessions.rb:ro
      - ./custom-config/initializers/oidc_setup.rb:/seek/config/initializers/oidc_setup.rb:ro

  seek_workers:
    # The SEEK delayed job workers
    <<: *seek_base
    container_name: seek-workers
    environment:
      <<: *seek_base_env
      QUIET_SUPERCRONIC: 1
    command: docker/start_workers.sh
    healthcheck:
      test: [ "CMD", "bash", "script/check_worker_pids.sh" ]
      retries: 5

  solr:
    image: fairdom/seek-solr:8.11
    container_name: seek-solr
    restart: always
    environment:
      SOLR_JAVA_MEM: -Xms512m -Xmx1024m
    volumes:
      - seek-solr-data:/var/solr/
    entrypoint:
      - docker-entrypoint.sh
      - solr-precreate
      - seek
      - /opt/solr/server/solr/configsets/seek_config

volumes:
  seek-filestore:
    external: true
  seek-mysql-db:
    external: true
  seek-solr-data:
    external: true
  seek-cache:
    external: true
